trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  workingDirectory: 'infra'
  serviceConnection: 'arm-service-conn-001'

steps:
  - checkout: self

  # Install Terraform
  - task: TerraformInstaller@1
    inputs:
      terraformVersion: '1.6.6'

  # Terraform Init
  - task: TerraformTaskV4@4
    displayName: "Terraform Init"
    inputs:
      provider: 'azurerm'
      command: 'init'
      workingDirectory: $(workingDirectory)
      backendServiceArm: $(serviceConnection)
      backendAzureRmResourceGroupName: 'rg-tf-metadata'
      backendAzureRmStorageAccountName: 'satfstate230440'
      backendAzureRmContainerName: 'tfstate'
      backendAzureRmKey: 'connected-car.tfstate'

  # Terraform Plan
  - task: TerraformTaskV4@4
    displayName: "Terraform Plan"
    inputs:
      provider: 'azurerm'
      command: 'plan'
      workingDirectory: $(workingDirectory)
